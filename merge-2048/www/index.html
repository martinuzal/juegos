<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c1f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Merge 2048</title>
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="topbar" class="topbar hidden">
      <div class="stat"><div class="stat-label">PUNTOS</div><div id="score" class="stat-val">0</div></div>
      <div class="title-mini">2048</div>
      <div class="stat"><div class="stat-label">MEJOR</div><div id="topBest" class="stat-val">0</div></div>
    </div>

    <canvas id="game"></canvas>

    <div id="toast" class="toast hidden"></div>

    <div id="start" class="overlay">
      <div class="panel">
        <h1 class="logo">MERGE<span>2048</span></h1>
        <p class="tagline">Desliza para mover. Une números iguales. ¡Llega a 2048!</p>
        <button id="playBtn" class="btn btn-primary">JUGAR</button>
        <div class="best-row">Mejor: <span id="startBest">0</span></div>
        <button id="muteBtn" class="btn-icon" aria-label="Silenciar">🔊</button>
      </div>
      <div class="hint-tap">Desliza ↑ ↓ ← →</div>
    </div>

    <div id="gameover" class="overlay hidden">
      <div class="panel">
        <h2 class="go-title">¡SIN MOVIMIENTOS!</h2>
        <div class="go-score-label">Puntos</div>
        <div id="finalScore" class="go-score">0</div>
        <div id="newBest" class="new-best hidden">¡NUEVO RÉCORD!</div>
        <div class="best-row">Mejor: <span id="goBest">0</span></div>
        <button id="continueBtn" class="btn btn-reward hidden">
          <span class="reward-ico">▶</span> Seguir (quitar fichas, ver anuncio)
        </button>
        <button id="restartBtn" class="btn btn-primary">REINTENTAR</button>
        <button id="homeBtn" class="btn btn-ghost">Inicio</button>
      </div>
    </div>
  </div>

  <script src="ads.js"></script>
  <script src="game.js"></script>
</body>
</html>
