<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Neon Zigzag</title>
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hud hidden">
      <div class="score-wrap">
        <div id="score" class="score">0</div>
        <div id="combo" class="combo hidden">x2</div>
      </div>
    </div>

    <!-- Start screen -->
    <div id="start" class="overlay">
      <div class="panel">
        <h1 class="logo">NEON<span>ZIGZAG</span></h1>
        <p class="tagline">Un toque. Cambia de dirección. No te caigas.</p>
        <button id="playBtn" class="btn btn-primary">JUGAR</button>
        <div class="best-row">Mejor: <span id="startBest">0</span></div>
        <button id="muteBtn" class="btn-icon" aria-label="Silenciar">🔊</button>
      </div>
      <div class="hint-tap">Toca para empezar</div>
    </div>

    <!-- Game over screen -->
    <div id="gameover" class="overlay hidden">
      <div class="panel">
        <h2 class="go-title">¡UPS!</h2>
        <div class="go-score-label">Puntuación</div>
        <div id="finalScore" class="go-score">0</div>
        <div id="newBest" class="new-best hidden">¡NUEVO RÉCORD!</div>
        <div class="best-row">Mejor: <span id="goBest">0</span></div>

        <button id="continueBtn" class="btn btn-reward hidden">
          <span class="reward-ico">▶</span> Continuar (Ver anuncio)
        </button>
        <button id="restartBtn" class="btn btn-primary">REINTENTAR</button>
        <button id="homeBtn" class="btn btn-ghost">Inicio</button>
      </div>
    </div>

    <!-- Tap to start banner inside gameplay -->
    <div id="tapToStart" class="tap-to-start hidden">TOCA PARA SALTAR</div>
  </div>

  <script src="ads.js"></script>
  <script src="game.js"></script>
</body>
</html>
